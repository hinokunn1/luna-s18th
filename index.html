<!-- FLOWER BLOOM -->
<div class="flower-bloom" id="flowerBloom">
  <div class="flower" id="flower">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="flower-core"></div>
  </div>
</div>

<style>
/* ═══════════════════════════════
   FLOWER BLOOM ANIMATION
═══════════════════════════════ */

.flower-bloom{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:20;
  opacity:0;
}

.flower{
  position:relative;
  width:120px;
  height:120px;
  transform:scale(.2) rotate(-20deg);
}

.flower.open{
  animation:bloomIn 1.7s cubic-bezier(.2,.9,.2,1) forwards;
}

@keyframes bloomIn{
  0%{
    opacity:0;
    transform:scale(.15) rotate(-35deg);
  }

  40%{
    opacity:1;
    transform:scale(1.18) rotate(8deg);
  }

  100%{
    opacity:1;
    transform:scale(1) rotate(0deg);
  }
}

.petal{
  position:absolute;
  width:54px;
  height:54px;
  background:
    radial-gradient(circle at 35% 35%, #ffe8e1, #e5b6a7);
  border-radius:50% 50% 45% 45%;
  transform-origin:center bottom;
  opacity:0;
  left:33px;
  top:33px;
  box-shadow:
    inset 0 2px 5px rgba(255,255,255,.5),
    0 4px 12px rgba(120,60,40,.15);
}

.flower.open .petal{
  animation:petalOpen 1.2s ease forwards;
}

.flower.open .petal:nth-child(1){
  transform:rotate(0deg) translateY(-28px);
  animation-delay:.08s;
}

.flower.open .petal:nth-child(2){
  transform:rotate(60deg) translateY(-28px);
  animation-delay:.16s;
}

.flower.open .petal:nth-child(3){
  transform:rotate(120deg) translateY(-28px);
  animation-delay:.24s;
}

.flower.open .petal:nth-child(4){
  transform:rotate(180deg) translateY(-28px);
  animation-delay:.32s;
}

.flower.open .petal:nth-child(5){
  transform:rotate(240deg) translateY(-28px);
  animation-delay:.40s;
}

.flower.open .petal:nth-child(6){
  transform:rotate(300deg) translateY(-28px);
  animation-delay:.48s;
}

@keyframes petalOpen{
  0%{
    opacity:0;
    scale:0;
  }

  100%{
    opacity:1;
    scale:1;
  }
}

.flower-core{
  position:absolute;
  width:34px;
  height:34px;
  background:
    radial-gradient(circle, #fff8ef, #d79c85);
  border-radius:50%;
  top:43px;
  left:43px;
  z-index:5;
  box-shadow:
    0 0 18px rgba(255,255,255,.7),
    inset 0 2px 4px rgba(255,255,255,.5);
}

/* ═══════════════════════════════
   ENVELOPE FIXES
═══════════════════════════════ */

.env-scene{
  position:relative;
  width:340px;
  max-width:86vw;
  padding-bottom:20px;
  cursor:pointer;
  transition:
    transform .8s cubic-bezier(.22,1,.36,1);
}

.env-wrap{
  position:relative;
  width:100%;
  transition:
    transform .55s cubic-bezier(.34,1.56,.64,1);
}

.env-scene:hover .env-wrap{
  transform:translateY(-8px);
}

.env-shadow{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:82%;
  height:18px;
  background:
    radial-gradient(
      ellipse,
      rgba(120,60,40,.22) 0%,
      transparent 70%
    );
  border-radius:50%;
  transition:all .4s ease;
}

.env-scene:hover .env-shadow{
  transform:translateX(-50%) scaleX(.9);
  opacity:.55;
}

/* envelope body */

.env-body{
  position:relative;
  width:100%;
  height:0;
  padding-top:62%;
  border-radius:8px;
  overflow:visible;
}

/* back */

.env-back{
  position:absolute;
  inset:0;
  border-radius:8px;
  background:
    linear-gradient(
      160deg,
      #f4e5da 0%,
      #e6cfbf 100%
    );

  border:1.5px solid #dcc0b0;

  box-shadow:
    0 10px 30px rgba(120,60,40,.12),
    inset 0 1px 0 rgba(255,255,255,.5);
}

/* left fold */

.env-tri-l{
  position:absolute;
  inset:0;

  clip-path:polygon(
    0 0,
    0 100%,
    51% 57%
  );

  background:
    linear-gradient(
      145deg,
      #ead7c7 0%,
      #d8bfae 100%
    );
}

/* right fold */

.env-tri-r{
  position:absolute;
  inset:0;

  clip-path:polygon(
    100% 0,
    100% 100%,
    49% 57%
  );

  background:
    linear-gradient(
      215deg,
      #ead7c7 0%,
      #d8bfae 100%
    );
}

/* bottom fold */

.env-tri-b{
  position:absolute;
  inset:0;

  clip-path:polygon(
    0 100%,
    100% 100%,
    50% 57%
  );

  background:
    linear-gradient(
      180deg,
      #dec8b7 0%,
      #ccb3a3 100%
    );
}

/* fold line */

.env-center-line{
  position:absolute;
  left:0;
  right:0;
  top:57%;
  height:1px;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(170,120,100,.35),
      transparent
    );
}

/* flap */

.env-flap-outer{
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:60%;

  transform-origin:top center;
  transform-style:preserve-3d;

  transition:
    transform 1.2s cubic-bezier(.22,1,.36,1);

  z-index:6;
}

.env-scene.open .env-flap-outer{
  transform:
    perspective(1200px)
    rotateX(-165deg);
}

.env-flap-face{
  position:absolute;
  inset:0;

  clip-path:polygon(
    0 0,
    100% 0,
    50% 82%
  );

  backface-visibility:hidden;
}

.env-flap-front{
  background:
    linear-gradient(
      160deg,
      #f7ebe0 0%,
      #ecd6c6 60%,
      #dfc5b4 100%
    );

  border-bottom:
    1px solid rgba(200,160,140,.35);
}

.env-flap-back{
  background:
    linear-gradient(
      160deg,
      #f0dfcf 0%,
      #e6cebe 100%
    );

  transform:rotateX(180deg);
}

/* glow */

.env-scene::after{
  content:'';
  position:absolute;
  inset:-20px;

  background:
    radial-gradient(
      circle,
      rgba(255,240,230,.55),
      transparent 70%
    );

  opacity:0;
  pointer-events:none;

  transition:opacity .8s ease;
}

.env-scene.open::after{
  opacity:1;
}

/* letter */

.env-letter{
  position:absolute;
  bottom:12%;
  left:50%;

  transform:
    translateX(-50%)
    translateY(0);

  width:70%;
  z-index:4;

  opacity:0;

  transition:
    opacity .5s ease,
    transform 1.3s cubic-bezier(.2,.9,.2,1);
}

.env-scene.open .env-letter{
  opacity:1;

  transform:
    translateX(-50%)
    translateY(-82%)
    scale(1.04);
}

.letter-paper{
  background:
    linear-gradient(
      170deg,
      #fffaf7 0%,
      #fdf3ed 100%
    );

  border:1px solid #e8d0c4;

  padding:18px 20px 14px;

  text-align:center;

  box-shadow:
    0 5px 20px rgba(120,60,40,.12);
}

/* wax seal */

.wax-seal{
  position:absolute;
  bottom:-18px;
  left:50%;

  transform:translateX(-50%);

  width:54px;
  height:54px;

  z-index:10;

  transition:
    transform .35s ease,
    opacity .4s ease;
}

.env-scene:hover .wax-seal{
  transform:
    translateX(-50%)
    scale(1.08);
}

.env-scene.open .wax-seal{
  opacity:0;
  pointer-events:none;
}

.wax-seal-circle{
  width:54px;
  height:54px;

  background:
    radial-gradient(
      circle at 38% 35%,
      #e09a70 0%,
      #c88760 45%,
      #9e6648 100%
    );

  border-radius:50%;

  border:
    2px solid rgba(180,110,70,.5);

  box-shadow:
    0 4px 18px rgba(140,70,40,.3),
    inset 0 1px 0 rgba(255,220,180,.45);

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:20px;
  color:#fff2e8;
}
</style>

<script>
let opened = false;

function openEnvelope() {

  if (opened) return;
  opened = true;

  const scene = document.getElementById('envScene');
  const flowerBloom = document.getElementById('flowerBloom');
  const flower = document.getElementById('flower');

  scene.style.cursor = 'default';

  /* flower bloom */
  flowerBloom.style.opacity = '1';
  flower.classList.add('open');

  /* envelope opens after flower */
  setTimeout(() => {

    scene.classList.add('open');

    scene.style.transform =
      'translateY(-12px) scale(1.02)';

  }, 350);

  /* hide texts */
  setTimeout(() => {

    ['openBtn', 'scrollHint'].forEach(id => {

      const el = document.getElementById(id);

      if (!el) return;

      el.style.transition =
        'opacity .5s ease, transform .5s ease';

      el.style.opacity = '0';
      el.style.transform = 'translateY(10px)';
    });

  }, 700);

  /* transition */
  setTimeout(() => {

    const ov = document.getElementById('overlay');

    ov.classList.add('show');

    setTimeout(() => {

      document.getElementById('page1').style.display = 'none';

      document.getElementById('page2').style.display = 'block';

      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });

      ov.classList.remove('show');

    }, 850);

  }, 2400);
}
</script>
